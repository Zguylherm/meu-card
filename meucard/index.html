<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>zGuylherme</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      color: #fff;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      user-select: none;
      -webkit-user-select: none;
    }

    button,
    input,
    a,
    img {
      touch-action: manipulation;
      -webkit-user-drag: none;
    }

    img.protected-img {
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
      pointer-events: auto;
    }

    .bg-fallback {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(130, 0, 0, 0.35), transparent 38%),
        linear-gradient(180deg, #210000, #000);
      z-index: -4;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      filter: brightness(0.38) saturate(1.28) contrast(1.04);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    .bg-video.loaded {
      opacity: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(160, 0, 20, 0.22), transparent 36%),
        radial-gradient(circle at top, rgba(123, 60, 255, 0.10), transparent 34%),
        linear-gradient(180deg, rgba(0,0,0,0.32), rgba(0,0,0,0.88));
      z-index: -2;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      animation: subir 0.8s ease forwards;
      perspective: 1200px;
    }

    @keyframes subir {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-card {
      background: linear-gradient(180deg, rgba(48, 0, 8, 0.78), rgba(22, 0, 4, 0.72));
      border: 1px solid rgba(255, 0, 45, 0.24);
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.42),
        0 0 38px rgba(255, 0, 35, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 26px;
      padding: 32px 28px;
      min-height: 330px;
    }

    .music-card {
      width: 100%;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(180deg, rgba(35, 0, 6, 0.90), rgba(18, 0, 3, 0.88));
      border: 1px solid rgba(255, 0, 45, 0.22);
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.36),
        0 0 36px rgba(255, 0, 35, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: 28px;
    }

    .profile-card,
    .music-card {
      --rx: 0deg;
      --ry: 0deg;
      --ty: 0px;
      --scale: 1;
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      transform:
        perspective(1100px)
        translateY(var(--ty))
        rotateX(var(--rx))
        rotateY(var(--ry))
        scale(var(--scale));
      transition:
        box-shadow 0.25s ease,
        border-color 0.25s ease,
        background 0.25s ease;
      will-change: transform;
      backface-visibility: hidden;
      contain: layout paint;
    }

    .profile-card > *,
    .music-card > * {
      position: relative;
      z-index: 2;
    }

    .profile-card::before,
    .music-card::before {
      content: "";
      position: absolute;
      inset: -1px;
      background:
        radial-gradient(circle at 18% 0%, rgba(255, 0, 60, 0.16), transparent 36%),
        radial-gradient(circle at 100% 100%, rgba(120, 50, 255, 0.11), transparent 42%);
      opacity: 0.78;
      transition: opacity 0.25s ease;
      pointer-events: none;
      transform: translateZ(0);
    }


    .profile-card:hover,
    .music-card:hover {
      border-color: rgba(255, 60, 100, 0.40);
      box-shadow:
        0 28px 80px rgba(0, 0, 0, 0.50),
        0 0 42px rgba(255, 0, 45, 0.24);
    }

    .profile-card:hover::before,
    .music-card:hover::before {
      opacity: 1;
    }

    .avatar {
      width: 105px;
      height: 105px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 24px rgba(255, 0, 45, 0.30),
        0 0 42px rgba(123, 60, 255, 0.12);
      margin-bottom: 20px;
      background: #000;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      transform: translateZ(34px);
    }

    h1 {
      font-size: 32px;
      line-height: 1;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 24px;
      text-shadow:
        0 0 14px rgba(255,255,255,0.10),
        0 0 24px rgba(255,0,45,0.16);
      transform: translateZ(26px);
    }

    .linha {
      height: 1px;
      width: 78%;
      background: linear-gradient(90deg, #7b3cff, rgba(255,0,45,0.55), transparent);
      margin-bottom: 20px;
    }

    .frase {
      font-size: 18px;
      font-weight: 800;
      font-style: italic;
      color: rgba(255,255,255,0.86);
      margin-bottom: 16px;
      text-shadow: 0 0 12px rgba(255,255,255,0.12);
    }

    .info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.74);
      margin: 13px 0;
    }

    .info i {
      color: #6b4cff;
      width: 17px;
      text-align: center;
      filter: drop-shadow(0 0 8px rgba(107,76,255,0.8));
    }

    .info a {
      color: rgba(255,255,255,0.74);
      text-decoration: none;
    }

    .info a:hover {
      color: #fff;
    }

    .music-cover {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow:
        0 0 18px rgba(255, 0, 45, 0.25),
        0 0 30px rgba(123, 60, 255, 0.16);
      background: #111;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      transform: translateZ(30px);
    }

    .music-content {
      flex: 1;
      min-width: 0;
      transform: translateZ(24px);
    }

    .music-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .music-header h2 {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-header p {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.82);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-equalizer {
      color: rgba(255,255,255,0.88);
      font-size: 15px;
      margin-top: 3px;
      animation: pulseIcon 1.2s ease-in-out infinite;
    }

    @keyframes pulseIcon {
      0%, 100% {
        opacity: 0.55;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.14);
      }
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time {
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      min-width: 32px;
    }

    .progress-wrap {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 999px;
      background: linear-gradient(
        to right,
        #ffffff 0%,
        #ffffff 0%,
        rgba(255,255,255,0.34) 0%,
        rgba(255,255,255,0.34) 100%
      );
      outline: none;
      cursor: pointer;
    }

    .progress-bar::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 0;
      height: 0;
    }

    .progress-bar::-moz-range-thumb {
      width: 0;
      height: 0;
      border: none;
    }

    .control-btn,
    .play-btn {
      border: none;
      background: transparent;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, opacity 0.2s ease, color 0.2s ease;
    }

    .control-btn {
      font-size: 13px;
      opacity: 0.72;
    }

    .play-btn {
      font-size: 22px;
      width: 28px;
    }

    .control-btn:hover,
    .play-btn:hover {
      opacity: 1;
      transform: scale(1.08);
    }


    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 520px) {
      body {
        align-items: flex-start;
        padding: 35px 14px 22px;
      }

      .container {
        max-width: 100%;
        gap: 18px;
      }

      .profile-card {
        min-height: auto;
        padding: 28px 24px;
      }

      h1 {
        font-size: 29px;
      }

      .frase {
        font-size: 16px;
      }

      .music-card {
        padding: 12px;
        gap: 12px;
      }

      .music-cover {
        width: 70px;
        height: 70px;
      }

      .music-header h2 {
        font-size: 14px;
      }

      .music-header p {
        font-size: 12px;
      }

      .time {
        font-size: 10px;
        min-width: 28px;
      }

      .control-btn {
        font-size: 11px;
      }

      .play-btn {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>

    <section class="music-card">

      >

          </button>

  <script>
    let lastTouchEnd = 0;

    document.addEventListener("touchend", function (event) {
      const now = Date.now();

      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }

      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener("gesturestart", function (event) {
      event.preventDefault();
    });

    const bgVideo = document.getElementById("bgVideo");
    const bgVideoUrl = "https://cdn.discordapp.com/attachments/1504180702067818607/1504238448943435931/the-shadow-fantasy-king-moewalls-com.mp4?ex=6a1c0379&is=6a1ab1f9&hm=3733f8379138bda474876a8899a5f903454b3df11260abd3cf01e8c6e9fbad5e&";

    if (bgVideo) {
      bgVideo.src = bgVideoUrl;
    }

    function carregarVideoFundo() {
      if (!bgVideo) return;

      bgVideo.muted = true;
      bgVideo.loop = true;
      bgVideo.playsInline = true;

      bgVideo.load();

      const tentarPlay = bgVideo.play();

      if (tentarPlay !== undefined) {
        tentarPlay
          .then(() => {
            bgVideo.classList.add("loaded");
          })
          .catch(() => {
            bgVideo.classList.remove("loaded");
          });
      }
    }

    bgVideo.addEventListener("loadeddata", () => {
      bgVideo.classList.add("loaded");
    });

    bgVideo.addEventListener("canplay", () => {
      bgVideo.classList.add("loaded");
      bgVideo.play().catch(() => {});
    });

    bgVideo.addEventListener("error", () => {
      bgVideo.classList.remove("loaded");
      console.log("O vídeo de fundo não carregou. O link do Discord pode ter expirado.");
    });

    window.addEventListener("load", () => {
      setTimeout(() => {
        carregarVideoFundo();
      }, 300);
    });

    document.addEventListener("click", () => {
      bgVideo.play().catch(() => {});
    }, { once: true });

    document.addEventListener("visibilitychange", () => {
      if (!document.hidden && bgVideo) {
        bgVideo.play().catch(() => {});
      }
    });

    const reduzirMovimento = window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    const ponteiroPreciso = window.matchMedia("(hover: hover) and (pointer: fine)").matches;
    const cardsTilt = document.querySelectorAll(".profile-card, .music-card");

    if (!reduzirMovimento) {
      cardsTilt.forEach((card) => {
        let alvoRx = 0;
        let alvoRy = 0;
        let alvoTy = 0;
        let alvoScale = 1;

        let atualRx = 0;
        let atualRy = 0;
        let atualTy = 0;
        let atualScale = 1;

        let animando = false;
        let resetTimer = null;

        function limitar(valor, min, max) {
          return Math.min(max, Math.max(min, valor));
        }

        function moverPara(clientX, clientY, forca = 8) {
          const rect = card.getBoundingClientRect();
          const x = limitar((clientX - rect.left) / rect.width, 0, 1);
          const y = limitar((clientY - rect.top) / rect.height, 0, 1);

          alvoRy = (x - 0.5) * forca * 2;
          alvoRx = -(y - 0.5) * forca * 2;
          alvoTy = -5;
          alvoScale = 1.018;

          iniciarAnimacao();
        }

        function voltarNormal() {
          alvoRx = 0;
          alvoRy = 0;
          alvoTy = 0;
          alvoScale = 1;
          iniciarAnimacao();
        }

        function iniciarAnimacao() {
          if (animando) return;
          animando = true;
          requestAnimationFrame(animar);
        }

        function animar() {
          atualRx += (alvoRx - atualRx) * 0.13;
          atualRy += (alvoRy - atualRy) * 0.13;
          atualTy += (alvoTy - atualTy) * 0.13;
          atualScale += (alvoScale - atualScale) * 0.13;

          card.style.setProperty("--rx", `${atualRx.toFixed(3)}deg`);
          card.style.setProperty("--ry", `${atualRy.toFixed(3)}deg`);
          card.style.setProperty("--ty", `${atualTy.toFixed(3)}px`);
          card.style.setProperty("--scale", atualScale.toFixed(4));

          const precisaContinuar =
            Math.abs(alvoRx - atualRx) > 0.01 ||
            Math.abs(alvoRy - atualRy) > 0.01 ||
            Math.abs(alvoTy - atualTy) > 0.01 ||
            Math.abs(alvoScale - atualScale) > 0.0005;

          if (precisaContinuar) {
            requestAnimationFrame(animar);
          } else {
            animando = false;
          }
        }

        if (ponteiroPreciso) {
          card.addEventListener("pointermove", (event) => {
            moverPara(event.clientX, event.clientY, 7.5);
          });

          card.addEventListener("pointerleave", () => {
            voltarNormal();
          });
        } else {
          card.addEventListener("pointerdown", (event) => {
            moverPara(event.clientX, event.clientY, 6.5);

            clearTimeout(resetTimer);
            resetTimer = setTimeout(() => {
              voltarNormal();
            }, 650);
          });

          card.addEventListener("pointerup", () => {
            clearTimeout(resetTimer);
            resetTimer = setTimeout(() => {
              voltarNormal();
            }, 360);
          });

          card.addEventListener("pointercancel", () => {
            voltarNormal();
          });
        }
      });
    }

    document.querySelectorAll(".protected-img").forEach((img) => {
      img.addEventListener("contextmenu", (event) => event.preventDefault());
      img.addEventListener("dragstart", (event) => event.preventDefault());
      img.addEventListener("selectstart", (event) => event.preventDefault());
    });

    const audio = document.getElementById("audioPlayer");
    const playBtn = document.getElementById("playBtn");
    const playIcon = playBtn.querySelector("i");
    const progressBar = document.getElementById("progressBar");
    const currentTimeEl = document.getElementById("currentTime");
    const durationTimeEl = document.getElementById("durationTime");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === Infinity) return "0:00";

      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60).toString().padStart(2, "0");

      return `${min}:${sec}`;
    }

    function updateProgressColor() {
      const value = progressBar.value;

      progressBar.style.background = `
        linear-gradient(
          to right,
          #ffffff 0%,
          #ffffff ${value}%,
          rgba(255,255,255,0.34) ${value}%,
          rgba(255,255,255,0.34) 100%
        )
      `;
    }

    audio.addEventListener("loadedmetadata", () => {
      durationTimeEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("timeupdate", () => {
      if (!audio.duration) return;

      const progress = (audio.currentTime / audio.duration) * 100;

      progressBar.value = progress;
      currentTimeEl.textContent = formatTime(audio.currentTime);

      updateProgressColor();
    });

    progressBar.addEventListener("input", () => {
      if (!audio.duration) return;

      audio.currentTime = (progressBar.value / 100) * audio.duration;
      updateProgressColor();
    });

    playBtn.addEventListener("click", (event) => {
      event.stopPropagation();

      if (audio.paused) {
        audio.play();

        playIcon.classList.remove("fa-play");
        playIcon.classList.add("fa-pause");
      } else {
        audio.pause();

        playIcon.classList.remove("fa-pause");
        playIcon.classList.add("fa-play");
      }
    });

    audio.addEventListener("ended", () => {
      playIcon.classList.remove("fa-pause");
      playIcon.classList.add("fa-play");

      progressBar.value = 0;
      currentTimeEl.textContent = "0:00";

      updateProgressColor();
    });

    backBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      audio.currentTime = Math.max(0, audio.currentTime - 10);
    });

    nextBtn.addEventListener("click", (event) => {
      event.stopPropagation();

      if (!audio.duration) return;

      audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
    });

    progressBar.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    updateProgressColor();
  </script>
</body>
</html>
