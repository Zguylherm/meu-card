<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
  />

  <title>zGuylherme</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link
    href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap"
    rel="stylesheet"
  >

  <link
    rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
  >

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
      overflow-x: hidden;
      touch-action: manipulation;
      overscroll-behavior: none;
    }

    body {
      min-height: 100vh;
      color: #fff;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      user-select: none;
      -webkit-user-select: none;
    }

    button,
    input,
    a,
    img {
      touch-action: manipulation;
      -webkit-user-drag: none;
    }

    .bg-fallback {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(130, 0, 0, 0.35), transparent 38%),
        linear-gradient(180deg, #210000, #000);
      z-index: -4;
    }

    .bg-video {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -3;
      filter: brightness(0.38) saturate(1.28) contrast(1.04);
      opacity: 0;
      transition: opacity 0.8s ease;
      pointer-events: none;
    }

    .bg-video.loaded {
      opacity: 1;
    }

    .overlay {
      position: fixed;
      inset: 0;
      background:
        radial-gradient(circle at center, rgba(160, 0, 20, 0.22), transparent 36%),
        radial-gradient(circle at top, rgba(123, 60, 255, 0.10), transparent 34%),
        linear-gradient(180deg, rgba(0,0,0,0.32), rgba(0,0,0,0.88));
      z-index: -2;
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 22px;
      animation: subir 0.8s ease forwards;
      perspective: 1200px;
    }

    @keyframes subir {
      from {
        opacity: 0;
        transform: translateY(25px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .profile-card {
      background: linear-gradient(180deg, rgba(48, 0, 8, 0.78), rgba(22, 0, 4, 0.72));
      border: 1px solid rgba(255, 0, 45, 0.24);
      box-shadow:
        0 22px 60px rgba(0, 0, 0, 0.42),
        0 0 38px rgba(255, 0, 35, 0.20),
        inset 0 1px 0 rgba(255,255,255,0.08);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 26px;
      padding: 32px 28px;
      min-height: 330px;
    }

    .music-card {
      width: 100%;
      padding: 14px;
      display: flex;
      align-items: center;
      gap: 14px;
      background: linear-gradient(180deg, rgba(35, 0, 6, 0.90), rgba(18, 0, 3, 0.88));
      border: 1px solid rgba(255, 0, 45, 0.22);
      box-shadow:
        0 18px 50px rgba(0, 0, 0, 0.36),
        0 0 36px rgba(255, 0, 35, 0.22),
        inset 0 1px 0 rgba(255,255,255,0.07);
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      border-radius: 28px;
    }

    .profile-card,
    .music-card {
      position: relative;
      overflow: hidden;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1), box-shadow 0.35s ease, border-color 0.35s ease;
      will-change: transform;
    }

    .profile-card > *,
    .music-card > * {
      position: relative;
      z-index: 2;
    }

    .profile-card::before,
    .music-card::before {
      content: "";
      position: absolute;
      inset: -80px;
      background:
        radial-gradient(circle at top left, rgba(255, 0, 60, 0.20), transparent 35%),
        radial-gradient(circle at bottom right, rgba(120, 50, 255, 0.14), transparent 40%);
      opacity: 0.9;
      pointer-events: none;
    }

    .profile-card::after,
    .music-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 0%, rgba(255,255,255,0.06) 42%, transparent 72%);
      opacity: 0;
      transform: translateX(-35%);
      transition: opacity 0.35s ease, transform 0.55s ease;
      pointer-events: none;
    }

    .profile-card:hover,
    .music-card:hover {
      border-color: rgba(255, 60, 100, 0.34);
      box-shadow:
        0 24px 70px rgba(0, 0, 0, 0.46),
        0 0 44px rgba(255, 0, 45, 0.28),
        inset 0 1px 0 rgba(255,255,255,0.10);
    }

    .profile-card:hover::after,
    .music-card:hover::after {
      opacity: 1;
      transform: translateX(35%);
    }

    .profile-top {
      display: flex;
      align-items: center;
      gap: 18px;
      margin-bottom: 20px;
    }

    .avatar-area {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .avatar {
      width: 105px;
      height: 105px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid rgba(255,255,255,0.08);
      box-shadow:
        0 0 24px rgba(255, 0, 45, 0.30),
        0 0 42px rgba(123, 60, 255, 0.12);
      margin-bottom: 0;
      background: #000;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      transform: translateZ(24px);
      flex-shrink: 0;
    }

    .profile-name-area {
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    h1 {
      font-size: 32px;
      line-height: 1.05;
      font-weight: 800;
      letter-spacing: 0.5px;
      margin-bottom: 0;
      text-shadow:
        0 0 14px rgba(255,255,255,0.10),
        0 0 24px rgba(255,0,45,0.16);
      word-break: break-word;
    }

    .linha {
      height: 1px;
      width: 78%;
      background: linear-gradient(90deg, #7b3cff, rgba(255,0,45,0.55), transparent);
      margin-bottom: 16px;
    }

    .frase {
      width: 105px;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 800;
      font-style: italic;
      color: rgba(255,255,255,0.86);
      text-align: center;
      text-shadow: 0 0 12px rgba(255,255,255,0.12);
    }

    .info {
      display: flex;
      align-items: center;
      gap: 12px;
      font-size: 16px;
      font-weight: 700;
      color: rgba(255,255,255,0.74);
      margin: 13px 0;
    }

    .info i {
      color: #6b4cff;
      width: 17px;
      text-align: center;
      filter: drop-shadow(0 0 8px rgba(107,76,255,0.8));
    }

    .music-cover {
      width: 80px;
      height: 80px;
      border-radius: 18px;
      object-fit: cover;
      flex-shrink: 0;
      box-shadow:
        0 0 18px rgba(255, 0, 45, 0.25),
        0 0 30px rgba(123, 60, 255, 0.16);
      background: #111;
      transition: transform 0.55s cubic-bezier(0.22, 1, 0.36, 1);
      transform: translateZ(24px);
    }

    .music-content {
      flex: 1;
      min-width: 0;
    }

    .music-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
    }

    .music-header h2 {
      font-size: 16px;
      font-weight: 800;
      color: #fff;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-header p {
      font-size: 13px;
      font-weight: 700;
      color: rgba(255,255,255,0.82);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .music-equalizer {
      color: rgba(255,255,255,0.88);
      font-size: 15px;
      margin-top: 3px;
      animation: pulseIcon 1.2s ease-in-out infinite;
    }

    @keyframes pulseIcon {
      0%, 100% {
        opacity: 0.55;
        transform: scale(1);
      }

      50% {
        opacity: 1;
        transform: scale(1.14);
      }
    }

    .player-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .time {
      font-size: 12px;
      font-weight: 800;
      color: #fff;
      min-width: 32px;
    }

    .progress-wrap {
      flex: 1;
      display: flex;
      align-items: center;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      appearance: none;
      -webkit-appearance: none;
      border-radius: 999px;
      background: linear-gradient(
        to right,
        #ffffff 0%,
        #ffffff 0%,
        rgba(255,255,255,0.34) 0%,
        rgba(255,255,255,0.34) 100%
      );
      outline: none;
      cursor: pointer;
    }

    .progress-bar::-webkit-slider-thumb {
      appearance: none;
      -webkit-appearance: none;
      width: 0;
      height: 0;
    }

    .progress-bar::-moz-range-thumb {
      width: 0;
      height: 0;
      border: none;
    }

    .control-btn,
    .play-btn {
      border: none;
      background: transparent;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s ease, opacity 0.2s ease, color 0.2s ease;
    }

    .control-btn {
      font-size: 13px;
      opacity: 0.72;
    }

    .play-btn {
      font-size: 22px;
      width: 28px;
    }

    .control-btn:hover,
    .play-btn:hover {
      opacity: 1;
      transform: scale(1.08);
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 520px) {
      body {
        align-items: flex-start;
        padding: 35px 14px 22px;
      }

      .container {
        max-width: 100%;
        gap: 18px;
      }

      .profile-card {
        min-height: auto;
        padding: 28px 24px;
      }

      .profile-top {
        gap: 14px;
        margin-bottom: 18px;
      }

      .avatar {
        width: 92px;
        height: 92px;
      }

      .frase {
        width: 92px;
        font-size: 11px;
      }

      h1 {
        font-size: 27px;
      }

      .music-card {
        padding: 12px;
        gap: 12px;
      }

      .music-cover {
        width: 70px;
        height: 70px;
      }

      .music-header h2 {
        font-size: 14px;
      }

      .music-header p {
        font-size: 12px;
      }

      .time {
        font-size: 10px;
        min-width: 28px;
      }

      .control-btn {
        font-size: 11px;
      }

      .play-btn {
        font-size: 19px;
      }
    }
  </style>
</head>

<body>
  <div class="bg-fallback"></div>

  <video
    id="bgVideo"
    class="bg-video"
    autoplay
    muted
    loop
    playsinline
    preload="auto"
  >
    <source
      src="https://cdn.discordapp.com/attachments/1504180702067818607/1504238448943435931/the-shadow-fantasy-king-moewalls-com.mp4?ex=6a083cf9&is=6a06eb79&hm=55811117c9435f3d59d3496110738df397e08c54f0e2e53c092cc4ed1a29cae3&"
      type="video/mp4"
    >
  </video>

  <div class="overlay"></div>

  <main class="container">
    <section class="profile-card">
      <div class="profile-top">
        <div class="avatar-area">
          <img
            class="avatar"
            src="https://i.pinimg.com/originals/03/f9/c9/03f9c952418ae59bf3a46efa83717710.gif"
            alt="Avatar"
          >

          <p class="frase">A vida no off, é mais sossegada</p>
        </div>

        <div class="profile-name-area">
          <h1>zGuylherme</h1>
        </div>
      </div>

      <div class="linha"></div>

      <div class="info">
        <i class="fa-solid fa-briefcase"></i>
        <span>desenvolvedor de software</span>
      </div>

      <div class="info">
        <i class="fa-solid fa-location-dot"></i>
        <span>localização: ele não se encontra.</span>
      </div>
    </section>

    <section class="music-card">
      <img
        class="music-cover"
        src="https://image-cdn-fa.spotifycdn.com/image/ab67616d00001e02746e0dc2fa7ef836f3177156"
        alt="Capa original da música I Feel Nothing"
      >

      <div class="music-content">
        <div class="music-header">
          <div>
            <h2>I Feel Nothing</h2>
            <p>Josh A, Lil Revive</p>
          </div>

          <i class="fa-solid fa-chart-simple music-equalizer"></i>
        </div>

        <div class="player-row">
          <span id="currentTime" class="time">0:00</span>

          <div class="progress-wrap">
            <input
              id="progressBar"
              class="progress-bar"
              type="range"
              min="0"
              max="100"
              value="0"
            >
          </div>

          <span id="durationTime" class="time">0:00</span>

          <button id="backBtn" class="control-btn" type="button" aria-label="Voltar 10 segundos">
            <i class="fa-solid fa-backward-step"></i>
          </button>

          <button id="playBtn" class="play-btn" type="button" aria-label="Tocar música">
            <i class="fa-solid fa-play"></i>
          </button>

          <button id="nextBtn" class="control-btn" type="button" aria-label="Avançar 10 segundos">
            <i class="fa-solid fa-forward-step"></i>
          </button>
        </div>
      </div>

      <audio id="audioPlayer" src="musica.mp3" preload="metadata"></audio>
    </section>
  </main>

  <script>
    let lastTouchEnd = 0;

    document.addEventListener("touchend", function (event) {
      const now = Date.now();

      if (now - lastTouchEnd <= 300) {
        event.preventDefault();
      }

      lastTouchEnd = now;
    }, { passive: false });

    document.addEventListener("gesturestart", function (event) {
      event.preventDefault();
    });

    const bgVideo = document.getElementById("bgVideo");

    function carregarVideoFundo() {
      if (!bgVideo) return;

      bgVideo.muted = true;
      bgVideo.loop = true;
      bgVideo.playsInline = true;

      bgVideo.load();

      const tentarPlay = bgVideo.play();

      if (tentarPlay !== undefined) {
        tentarPlay
          .then(() => {
            bgVideo.classList.add("loaded");
          })
          .catch(() => {
            bgVideo.classList.remove("loaded");
          });
      }
    }

    bgVideo.addEventListener("loadeddata", () => {
      bgVideo.classList.add("loaded");
    });

    bgVideo.addEventListener("canplay", () => {
      bgVideo.classList.add("loaded");
      bgVideo.play().catch(() => {});
    });

    bgVideo.addEventListener("error", () => {
      bgVideo.classList.remove("loaded");
      console.log("O vídeo de fundo não carregou. O link do Discord pode ter expirado.");
    });

    window.addEventListener("load", () => {
      setTimeout(() => {
        carregarVideoFundo();
      }, 300);
    });

    document.addEventListener("click", () => {
      bgVideo.play().catch(() => {});
    }, { once: true });

    const cardsTilt = document.querySelectorAll(".profile-card, .music-card");

    function aplicarTilt(card, clientX, clientY) {
      const rect = card.getBoundingClientRect();

      const x = clientX - rect.left;
      const y = clientY - rect.top;

      const meioX = rect.width / 2;
      const meioY = rect.height / 2;

      const rotateY = ((x - meioX) / meioX) * 5;
      const rotateX = -((y - meioY) / meioY) * 5;

      card.style.transform = `
        rotateX(${rotateX}deg)
        rotateY(${rotateY}deg)
        scale(1.012)
      `;
    }

    function resetTilt(card) {
      card.style.transform = "rotateX(0deg) rotateY(0deg) scale(1)";
    }

    cardsTilt.forEach((card) => {
      card.addEventListener("mousemove", (event) => {
        aplicarTilt(card, event.clientX, event.clientY);
      });

      card.addEventListener("mouseleave", () => {
        resetTilt(card);
      });

      card.addEventListener("touchstart", (event) => {
        const touch = event.touches[0];
        aplicarTilt(card, touch.clientX, touch.clientY);
      }, { passive: true });

      card.addEventListener("touchmove", (event) => {
        const touch = event.touches[0];
        aplicarTilt(card, touch.clientX, touch.clientY);
      }, { passive: true });

      card.addEventListener("touchend", () => {
        setTimeout(() => {
          resetTilt(card);
        }, 450);
      });

      card.addEventListener("click", (event) => {
        aplicarTilt(card, event.clientX, event.clientY);

        setTimeout(() => {
          resetTilt(card);
        }, 550);
      });
    });

    const audio = document.getElementById("audioPlayer");
    const playBtn = document.getElementById("playBtn");
    const playIcon = playBtn.querySelector("i");
    const progressBar = document.getElementById("progressBar");
    const currentTimeEl = document.getElementById("currentTime");
    const durationTimeEl = document.getElementById("durationTime");
    const backBtn = document.getElementById("backBtn");
    const nextBtn = document.getElementById("nextBtn");

    function formatTime(seconds) {
      if (isNaN(seconds) || seconds === Infinity) return "0:00";

      const min = Math.floor(seconds / 60);
      const sec = Math.floor(seconds % 60).toString().padStart(2, "0");

      return `${min}:${sec}`;
    }

    function updateProgressColor() {
      const value = progressBar.value;

      progressBar.style.background = `
        linear-gradient(
          to right,
          #ffffff 0%,
          #ffffff ${value}%,
          rgba(255,255,255,0.34) ${value}%,
          rgba(255,255,255,0.34) 100%
        )
      `;
    }

    audio.addEventListener("loadedmetadata", () => {
      durationTimeEl.textContent = formatTime(audio.duration);
    });

    audio.addEventListener("timeupdate", () => {
      if (!audio.duration) return;

      const progress = (audio.currentTime / audio.duration) * 100;

      progressBar.value = progress;
      currentTimeEl.textContent = formatTime(audio.currentTime);

      updateProgressColor();
    });

    progressBar.addEventListener("input", () => {
      if (!audio.duration) return;

      audio.currentTime = (progressBar.value / 100) * audio.duration;
      updateProgressColor();
    });

    playBtn.addEventListener("click", (event) => {
      event.stopPropagation();

      if (audio.paused) {
        audio.play();

        playIcon.classList.remove("fa-play");
        playIcon.classList.add("fa-pause");
      } else {
        audio.pause();

        playIcon.classList.remove("fa-pause");
        playIcon.classList.add("fa-play");
      }
    });

    audio.addEventListener("ended", () => {
      playIcon.classList.remove("fa-pause");
      playIcon.classList.add("fa-play");

      progressBar.value = 0;
      currentTimeEl.textContent = "0:00";

      updateProgressColor();
    });

    backBtn.addEventListener("click", (event) => {
      event.stopPropagation();
      audio.currentTime = Math.max(0, audio.currentTime - 10);
    });

    nextBtn.addEventListener("click", (event) => {
      event.stopPropagation();

      if (!audio.duration) return;

      audio.currentTime = Math.min(audio.duration, audio.currentTime + 10);
    });

    progressBar.addEventListener("click", (event) => {
      event.stopPropagation();
    });

    updateProgressColor();
  </script>
</body>
</html>
